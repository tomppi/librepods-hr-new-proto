name: Build one-bud HR handoff APK (PR trigger)

on:
  pull_request:
    paths:
      - .github/hr-build-trigger.txt

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out HR feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build FOSS debug APK
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleFossDebug

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          APK="$(find android/app/build/outputs/apk/foss/debug -type f -name '*.apk' | head -n 1)"
          test -n "$APK"
          cp "$APK" LibrePods-HR-one-bud-handoff-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibrePods-HR-one-bud-handoff-debug-APK
          path: LibrePods-HR-one-bud-handoff-debug.apk
          if-no-files-found: error
