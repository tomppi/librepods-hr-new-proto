name: Build clean HR APK

on:
  push:
    branches:
      - agent/heart-rate-clean-trigger
    paths:
      - .github/workflows/build-clean-hr-apk.yml
      - BUILD_APK_TRIGGER
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean HR source
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          submodules: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install required NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Build FOSS debug APK
        working-directory: android
        run: ./gradlew assembleFossDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibrePods-HR-debug-APK
          path: android/app/build/outputs/apk/foss/debug/app-foss-debug.apk
          if-no-files-found: error
          retention-days: 30
