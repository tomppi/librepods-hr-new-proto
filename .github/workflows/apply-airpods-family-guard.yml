name: Apply and verify AirPods family guard

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-build-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out automation files
        uses: actions/checkout@v4
        with:
          ref: main
          path: automation

      - name: Check out clean HR branch
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          path: source
          fetch-depth: 0
          submodules: true

      - name: Apply model-family identification guard
        run: python3 automation/.github/scripts/apply_airpods_family_guard.py source

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install required NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Build FOSS debug APK
        working-directory: source/android
        run: ./gradlew assembleFossDebug

      - name: Commit verified guard when changed
        working-directory: source
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git config user.name "OpenAI"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt
          git commit -m "Fix AirPods identification across bud model flips"
          git push origin HEAD:agent/heart-rate-clean
