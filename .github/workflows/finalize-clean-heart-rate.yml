name: Finalize clean heart-rate feature

on:
  pull_request:
    branches:
      - agent/heart-rate-clean
    types:
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  apply-build-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          fetch-depth: 0
          submodules: true

      - name: Apply clean HR patch and preview fix
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import re
          from pathlib import Path

          workflow = Path('.github/workflows/apply-clean-heart-rate.yml').read_text()
          match = re.search(r"echo '([A-Za-z0-9+/=]+)' \| base64", workflow)
          if not match:
              raise SystemExit('Could not locate embedded source patch')
          Path('/tmp/apply_clean_hr.py').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          python3 /tmp/apply_clean_hr.py
          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/src/main/java/me/kavishdevar/librepods/presentation/screens/AirPodsSettingsScreen.kt')
          text = path.read_text()
          old = '''                navigateToEqualizer = {},
                navigateToHeadTracking = {},'''
          new = '''                navigateToEqualizer = {},
                navigateToHeartRate = {},
                navigateToHeadTracking = {},'''
          if text.count(old) != 2:
              raise SystemExit(f'Expected two preview call sites, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          rm .github/workflows/apply-clean-heart-rate.yml
          rm .github/workflows/diagnose-clean-heart-rate.yml
          rm .github/workflows/finalize-clean-heart-rate.yml

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3

      - name: Accept licenses and install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager 'ndk;30.0.14904198'

      - name: Build FOSS debug APK
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set +e
          (cd android && ./gradlew assembleFossDebug) 2>&1 | tee /tmp/clean-hr-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo 'Clean HR build diagnostics (finalizer):'
              echo
              echo '```text'
              grep -E '(^e:| error:|FAILURE:|\.kt:[0-9]+|What went wrong:)' /tmp/clean-hr-build.log | tail -n 240
              echo '```'
            } > /tmp/clean-hr-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/clean-hr-comment.md
          fi
          exit "$status"

      - name: Commit verified clean implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android .github/workflows
          git commit -m 'Add clean heart-rate support [skip ci]'
          git push origin HEAD:agent/heart-rate-clean
