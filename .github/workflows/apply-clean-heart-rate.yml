name: Apply clean heart-rate feature

on:
  pull_request:
    branches:
      - agent/heart-rate-clean
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean HR branch
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          fetch-depth: 0
          submodules: true

      - name: Apply minimal HR feature
        shell: bash
        run: |
          echo '' | base64 --decode | gzip --decompress > /tmp/apply_clean_hr.py
          python3 /tmp/apply_clean_hr.py
          rm .github/workflows/apply-clean-heart-rate.yml

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install required NDK
        run: sdkmanager 'ndk;30.0.14904198'

      - name: Build FOSS debug APK
        run: ./gradlew assembleFossDebug
        working-directory: android

      - name: Commit clean HR implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android .github/workflows/apply-clean-heart-rate.yml
          git commit -m 'Add clean heart-rate support [skip ci]'
          git push origin HEAD:agent/heart-rate-clean
