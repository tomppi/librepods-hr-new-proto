name: Build central disconnect HR recovery APK

on:
  pull_request:
    paths:
      - .github/rtbuddy-handover-format-trigger.txt

permissions:
  contents: write

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean HR feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          fetch-depth: 0

      - name: Add central disconnect recovery preservation and role reset
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt')
          text = path.read_text()
          old = '''                } else if (intent?.action == AirPodsNotifications.AIRPODS_DISCONNECTED) {
                    device = null
//                    isConnectedLocally = false
                    popupShown = false
                    updateNotificationContent(false)
                    aacpManager.disconnected()
                    BluetoothConnectionManager.aacpSocket = null
                    BluetoothConnectionManager.attSocket = null
                }
'''
          new = '''                } else if (intent?.action == AirPodsNotifications.AIRPODS_DISCONNECTED) {
                    device = null
//                    isConnectedLocally = false
                    popupShown = false
                    updateNotificationContent(false)
                    maybeArmHeartRateReconnectRecoveryBeforeDisconnect("airpods_disconnected")
                    cancelHeartRateReconnectRecovery("airpods_disconnected")
                    currentPrimaryBudRole = null
                    if (::aacpManager.isInitialized) aacpManager.disconnected()
                    BluetoothConnectionManager.aacpSocket = null
                    BluetoothConnectionManager.attSocket = null
                }
'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one central disconnect block, found {count}')
          path.write_text(text.replace(old, new, 1))
          PY

          git diff --check
          grep -q 'maybeArmHeartRateReconnectRecoveryBeforeDisconnect("airpods_disconnected")' android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt
          grep -q 'cancelHeartRateReconnectRecovery("airpods_disconnected")' android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt
          grep -q 'currentPrimaryBudRole = null' android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt
          git commit -m 'Preserve HR recovery on central disconnect'
          git push origin HEAD:agent/heart-rate-clean

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Accept licenses and install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install 'ndk;30.0.14904198'

      - name: Build FOSS debug APK
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleFossDebug

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          APK="$(find android/app/build/outputs/apk/foss/debug -type f -name '*.apk' | head -n 1)"
          test -n "$APK"
          cp "$APK" LibrePods-HR-central-disconnect-role-reset-debug.apk
          sha256sum LibrePods-HR-central-disconnect-role-reset-debug.apk > LibrePods-HR-central-disconnect-role-reset-debug.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibrePods-HR-central-disconnect-role-reset-debug-APK
          path: |
            LibrePods-HR-central-disconnect-role-reset-debug.apk
            LibrePods-HR-central-disconnect-role-reset-debug.apk.sha256
          if-no-files-found: error
