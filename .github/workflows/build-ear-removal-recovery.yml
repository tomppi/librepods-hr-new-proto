name: Build ear-removal HR recovery APK

on:
  pull_request:
    paths:
      - .github/ear-removal-recovery-trigger.txt

permissions:
  contents: write

jobs:
  patch-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out HR feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          fetch-depth: 0

      - name: Trigger recovery when one AirPod is removed
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt")
          text = path.read_text()

          old = """        earDetectionNotification.setStatus(earDetection)
          scheduleHeartRateStopIfEarbudRemoved(
              listOf(
                  earDetectionNotification.status.getOrElse(0) { 0x01.toByte() } == 0x00.toByte(),
                  earDetectionNotification.status.getOrElse(1) { 0x01.toByte() } == 0x00.toByte()
              )
          )
          """
          new = """        earDetectionNotification.setStatus(earDetection)
          val updatedInEarData = listOf(
              earDetectionNotification.status.getOrElse(0) { 0x01.toByte() } == 0x00.toByte(),
              earDetectionNotification.status.getOrElse(1) { 0x01.toByte() } == 0x00.toByte()
          )
          if (inEarData.count { it } == 2 &&
              updatedInEarData.count { it } == 1 &&
              ::aacpManager.isInitialized &&
              aacpManager.heartRateStreamingRequested
          ) {
              armHeartRateReconnectRecovery("earbud_removed")
              schedulePendingHeartRateReconnectRecovery("earbud_removed_existing_socket")
          }
          scheduleHeartRateStopIfEarbudRemoved(updatedInEarData)
          """

          if text.count(old) != 1:
              raise SystemExit(f"expected one ear-state block, found {text.count(old)}")
          text = text.replace(old, new, 1)
          text = text.replace(
              "HR-RECONNECT-RECOVERY RTBuddy-only stop on fresh socket:",
              "HR-RECONNECT-RECOVERY RTBuddy-only stop on active AACP socket:",
          )
          text = text.replace(
              "after fresh AACP socket: reason=",
              "after recovery trigger: reason=",
          )
          path.write_text(text)
          PY

          git diff --check
          grep -q 'armHeartRateReconnectRecovery("earbud_removed")' android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt
          grep -q 'schedulePendingHeartRateReconnectRecovery("earbud_removed_existing_socket")' android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt
          git commit -m 'Run HR recovery when one AirPod is removed'
          git push origin HEAD:agent/heart-rate-clean

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Accept licenses and install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --install 'ndk;30.0.14904198'

      - name: Build FOSS debug APK
        working-directory: android
        shell: bash
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew assembleFossDebug

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail
          APK="$(find android/app/build/outputs/apk/foss/debug -type f -name '*.apk' | head -n 1)"
          test -n "$APK"
          cp "$APK" LibrePods-HR-ear-removal-recovery-debug.apk
          sha256sum LibrePods-HR-ear-removal-recovery-debug.apk > LibrePods-HR-ear-removal-recovery-debug.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LibrePods-HR-ear-removal-recovery-debug-APK
          path: |
            LibrePods-HR-ear-removal-recovery-debug.apk
            LibrePods-HR-ear-removal-recovery-debug.apk.sha256
          if-no-files-found: error
