name: Apply one-bud HR handoff from main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-one-bud-hr-handoff-main.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out HR feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          fetch-depth: 0
          path: feature

      - name: Apply one-bud handoff behavior
        shell: bash
        working-directory: feature
        run: |
          set -euo pipefail
          echo '' | base64 -d > /tmp/patch_one_bud.py
          python3 /tmp/patch_one_bud.py
          rm -f .github/workflows/apply-one-bud-hr-handoff.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/src/main/java/me/kavishdevar/librepods/services/AirPodsService.kt .github/workflows/apply-one-bud-hr-handoff.yml
          git commit -m "Preserve HR across one-bud handoff"
          git push origin HEAD:agent/heart-rate-clean

      - name: Check out main for cleanup
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: cleanup

      - name: Remove temporary workflow from main
        shell: bash
        working-directory: cleanup
        run: |
          set -euo pipefail
          rm .github/workflows/apply-one-bud-hr-handoff-main.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/apply-one-bud-hr-handoff-main.yml
          git commit -m "Remove temporary HR handoff workflow"
          git push origin HEAD:main
