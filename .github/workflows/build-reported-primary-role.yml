name: Promote chosen commit and delete branches

on:
  pull_request:
    paths:
      - .github/reported-primary-role-trigger.txt

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote chosen commit and remove other branches
        shell: bash
        run: |
          set -euo pipefail
          TARGET='2dd9beae4a9785828083a7f236d78b8ab3854116'

          echo 'Branches before cleanup:'
          git ls-remote --heads origin

          git push --force origin "$TARGET:refs/heads/main"

          mapfile -t branches < <(
            git ls-remote --heads origin |
              awk '{sub("refs/heads/", "", $2); print $2}'
          )

          for branch in "${branches[@]}"; do
            if [[ "$branch" != 'main' ]]; then
              echo "Deleting branch: $branch"
              git push origin --delete "$branch"
            fi
          done

          echo 'Branches after cleanup:'
          git ls-remote --heads origin

          branch_count="$(git ls-remote --heads origin | wc -l | tr -d ' ')"
          main_sha="$(git ls-remote --heads origin refs/heads/main | awk '{print $1}')"
          test "$branch_count" = '1'
          test "$main_sha" = "$TARGET"
