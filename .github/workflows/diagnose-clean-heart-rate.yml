name: Diagnose clean heart-rate build

on:
  pull_request:
    branches:
      - agent/heart-rate-clean
    types:
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/heart-rate-clean
          submodules: true

      - name: Extract and apply pending source patch
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import re
          from pathlib import Path

          workflow = Path('.github/workflows/apply-clean-heart-rate.yml').read_text()
          match = re.search(r"echo '([A-Za-z0-9+/=]+)' \| base64", workflow)
          if not match:
              raise SystemExit('Could not locate embedded source patch')
          Path('/tmp/apply_clean_hr.py').write_bytes(gzip.decompress(base64.b64decode(match.group(1))))
          PY
          python3 /tmp/apply_clean_hr.py

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3

      - name: Accept licenses and install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager 'ndk;30.0.14904198'

      - name: Build and report compiler diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set +e
          (cd android && ./gradlew assembleFossDebug) 2>&1 | tee /tmp/clean-hr-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo 'Clean HR build diagnostics:'
              echo
              echo '```text'
              grep -E '(^e:| error:|FAILURE:|\.kt:[0-9]+|What went wrong:)' /tmp/clean-hr-build.log | tail -n 240
              echo '```'
            } > /tmp/clean-hr-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/clean-hr-comment.md
          fi
          exit "$status"
